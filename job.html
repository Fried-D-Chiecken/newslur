<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fullscreen Image</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: black;
    }

    img {
        width: 100vw;
        height: 100vh;
        object-fit: cover; /* fills screen while keeping aspect ratio */
        display: block;
    }
</style>
</head>

<body>

<img src="job-application-sample.png" alt="Fullscreen Image">
    <audio loop autoplay>a-job_ViRpYcY.mp3</audio>

</body>
</html>
